<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxStay — Hotel Check-In & Check-Out Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --gold: #8B6220;
    --gold-light: #C9A84C;
    --dark: #F7F3EE;
    --dark2: #FFFFFF;
    --dark3: #F0EBE3;
    --dark4: #E8E0D4;
    --cream: #2C2417;
    --white: #FFFFFF;
    --text-muted: #8A7A65;
    --success: #2E7D52;
    --error: #C0392B;
    --info: #1A5E99;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Grain overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999; opacity:.3;
  }

  /* NAVBAR */
  .navbar {
    position: fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 48px;
    background: linear-gradient(180deg, rgba(247,243,238,0.98) 0%, rgba(247,243,238,0) 100%);
    border-bottom: 1px solid rgba(139,98,32,0.15);
    backdrop-filter: blur(10px);
  }
  .logo {
    font-family:'Cormorant Garamond',serif;
    font-size:26px; font-weight:700;
    color:var(--gold); letter-spacing:2px;
  }
  .logo span { color: var(--cream); font-weight:300; }
  .nav-tabs { display:flex; gap:8px; }
  .nav-tab {
    padding:8px 20px; border-radius:2px; border:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    letter-spacing:1px; text-transform:uppercase; transition: all 0.3s;
    background:transparent; color:var(--text-muted);
  }
  .nav-tab:hover { color:var(--gold); }
  .nav-tab.active {
    background: rgba(139,98,32,0.10);
    color:var(--gold);
    border: 1px solid rgba(139,98,32,0.3);
  }
  .nav-user {
    display:flex; align-items:center; gap:12px;
    font-size:13px; color:var(--text-muted);
  }
  .avatar {
    width:36px; height:36px; border-radius:50%;
    background: linear-gradient(135deg, var(--gold), #8B6914);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:600; color:var(--dark);
  }

  /* MAIN */
  .main { padding-top:90px; min-height:100vh; }

  /* HERO */
  .hero {
    position:relative; padding: 60px 48px 40px;
    background: linear-gradient(135deg, #EDE5D8 0%, #F7F3EE 60%);
    border-bottom: 1px solid rgba(139,98,32,0.12);
    overflow:hidden;
  }
  .hero::after {
    content:''; position:absolute; right:-100px; top:-100px;
    width:500px; height:500px; border-radius:50%;
    background: radial-gradient(circle, rgba(139,98,32,0.07) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero-label {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:var(--gold); margin-bottom:12px; font-weight:500;
  }
  .hero-title {
    font-family:'Cormorant Garamond',serif;
    font-size:52px; font-weight:300; line-height:1.1;
    color:var(--cream); margin-bottom:8px;
  }
  .hero-title strong { color:var(--gold); font-weight:700; }
  .hero-sub { font-size:14px; color:var(--text-muted); max-width:400px; line-height:1.7; }

  /* STATS ROW */
  .stats-row {
    display:flex; gap:0;
    border-bottom:1px solid rgba(139,98,32,0.12);
    background:#FFFFFF;
  }
  .stat-card {
    flex:1; padding:24px 32px;
    border-right:1px solid rgba(139,98,32,0.1);
    transition: background 0.3s;
  }
  .stat-card:last-child { border-right:none; }
  .stat-card:hover { background:#FAF7F2; }
  .stat-num {
    font-family:'Cormorant Garamond',serif;
    font-size:36px; font-weight:700; color:var(--gold);
  }
  .stat-label { font-size:12px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

  /* CONTENT AREA */
  .content { padding:40px 48px; }

  /* PANELS */
  .panel {
    background:#FFFFFF;
    border:1px solid rgba(139,98,32,0.12);
    border-radius:4px;
    overflow:hidden;
    animation: fadeUp 0.4s ease;
    box-shadow: 0 2px 16px rgba(139,98,32,0.06);
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }
  .panel-header {
    padding:24px 32px;
    border-bottom:1px solid rgba(139,98,32,0.1);
    display:flex; align-items:center; justify-content:space-between;
    background: linear-gradient(90deg, #FAF7F2, #FFFFFF);
  }
  .panel-title {
    font-family:'Cormorant Garamond',serif;
    font-size:22px; font-weight:600; color:var(--cream);
  }
  .panel-title span { color:var(--gold); }
  .panel-badge {
    padding:4px 14px; border-radius:2px; font-size:11px;
    letter-spacing:2px; text-transform:uppercase; font-weight:600;
  }
  .badge-intermediate { background:rgba(92,155,224,0.15); color:var(--info); border:1px solid rgba(92,155,224,0.3); }
  .badge-success { background:rgba(76,175,124,0.15); color:var(--success); border:1px solid rgba(76,175,124,0.3); }
  .badge-gold { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }

  /* STEPS */
  .steps {
    display:flex; padding:24px 32px; gap:0;
    border-bottom:1px solid rgba(139,98,32,0.08);
    background:#FAF7F2;
  }
  .step {
    display:flex; align-items:center; gap:12px; flex:1;
    cursor:pointer; padding:8px 0; transition:all 0.3s;
  }
  .step:last-child { flex:0; }
  .step-num {
    width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:600; flex-shrink:0;
    border:2px solid rgba(139,98,32,0.2);
    color:var(--text-muted); transition:all 0.3s;
  }
  .step.active .step-num, .step.done .step-num {
    background:var(--gold); color:var(--dark);
    border-color:var(--gold);
  }
  .step-info { flex:1; }
  .step-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
  .step.active .step-label { color:var(--gold); }
  .step.done .step-label { color:var(--success); }
  .step-title { font-size:13px; font-weight:500; color:var(--cream); margin-top:2px; }
  .step-line {
    flex:1; height:1px; background:rgba(139,98,32,0.15); margin:0 12px;
    max-width:60px;
  }
  .step-line.done { background:var(--gold); }

  /* FORM */
  .form-body { padding:32px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .form-group { display:flex; flex-direction:column; gap:8px; }
  .form-group.full { grid-column:1/-1; }
  .form-label {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold); font-weight:600;
  }
  .form-input, .form-select {
    background:#FAF7F2; border:1px solid rgba(139,98,32,0.2);
    border-radius:3px; padding:12px 16px;
    color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px;
    transition:all 0.3s; outline:none;
    width:100%;
  }
  .form-input:focus, .form-select:focus {
    border-color:var(--gold);
    background:#FFFFFF;
    box-shadow:0 0 0 3px rgba(139,98,32,0.08);
  }
  .form-input.error { border-color:var(--error); }
  .error-msg { font-size:12px; color:var(--error); margin-top:4px; }
  .form-select option { background:#FAF7F2; }

  /* UPLOAD */
  .upload-zone {
    border:2px dashed rgba(139,98,32,0.25); border-radius:4px;
    padding:32px; text-align:center; cursor:pointer;
    transition:all 0.3s; background:#FAF7F2;
    position:relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color:var(--gold); background:rgba(139,98,32,0.04); }
  .upload-icon { font-size:36px; margin-bottom:12px; }
  .upload-text { font-size:14px; color:var(--text-muted); }
  .upload-text strong { color:var(--gold); }
  .upload-preview {
    margin-top:16px; padding:12px 16px;
    background:rgba(46,125,82,0.08); border:1px solid rgba(46,125,82,0.3);
    border-radius:3px; display:flex; align-items:center; gap:12px;
    font-size:13px; color:var(--success);
  }

  /* ROOM CARDS */
  .rooms-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding:32px; }
  .room-card {
    background:#FAF7F2; border:2px solid rgba(139,98,32,0.12);
    border-radius:4px; overflow:hidden; cursor:pointer;
    transition:all 0.3s; position:relative;
  }
  .room-card:hover { border-color:rgba(139,98,32,0.4); transform:translateY(-2px); box-shadow:0 8px 24px rgba(139,98,32,0.1); }
  .room-card.selected { border-color:var(--gold); box-shadow:0 8px 24px rgba(139,98,32,0.15); }
  .room-card.selected::after {
    content:'✓ SELECTED';
    position:absolute; top:12px; right:12px;
    background:var(--gold); color:var(--dark);
    font-size:10px; font-weight:700; letter-spacing:2px;
    padding:4px 10px; border-radius:2px;
  }
  .room-img {
    height:140px; display:flex; align-items:center; justify-content:center;
    font-size:48px; position:relative; overflow:hidden;
  }
  .room-img.deluxe { background:linear-gradient(135deg, #F5E6C8, #EDD49A); }
  .room-img.suite { background:linear-gradient(135deg, #C8D9F5, #9ABCED); }
  .room-img.presidential { background:linear-gradient(135deg, #E8C8F5, #D09AED); }
  .room-type-badge {
    position:absolute; bottom:12px; left:12px;
    padding:3px 10px; border-radius:2px; font-size:10px;
    letter-spacing:2px; text-transform:uppercase; font-weight:700;
  }
  .room-body { padding:16px; }
  .room-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:var(--cream); }
  .room-price { color:var(--gold); font-size:20px; font-weight:600; margin:8px 0; }
  .room-price span { font-size:12px; color:var(--text-muted); font-weight:400; }
  .room-features { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .feature-tag {
    padding:3px 10px; background:rgba(139,98,32,0.08);
    border:1px solid rgba(139,98,32,0.15); border-radius:2px;
    font-size:11px; color:var(--text-muted); letter-spacing:0.5px;
  }

  /* DIGITAL KEY */
  .key-container { padding:32px; display:flex; flex-direction:column; align-items:center; gap:24px; }
  .key-card {
    width:340px; background:linear-gradient(135deg, #2C2417, #3D3220);
    border:1px solid rgba(201,168,76,0.4); border-radius:12px;
    padding:32px; text-align:center; position:relative; overflow:hidden;
    color:#F5F0E8;
  }
  .key-card::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle, rgba(201,168,76,0.15), transparent);
  }
  .key-icon { font-size:56px; margin-bottom:16px; display:block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
  .key-room-num {
    font-family:'Cormorant Garamond',serif;
    font-size:48px; font-weight:700; color:#C9A84C; letter-spacing:4px;
  }
  .key-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(245,240,232,0.6); margin-bottom:20px; }
  .key-qr {
    width:100px; height:100px; margin:0 auto 16px;
    background:#F5F0E8; border-radius:4px; padding:8px;
    display:grid; grid-template-columns:repeat(7,1fr); gap:2px;
  }
  .qr-cell { background:#2C2417; border-radius:1px; }
  .qr-cell.w { background:#F5F0E8; }
  .key-guest { font-size:14px; color:#F5F0E8; }
  .key-valid { font-size:12px; color:rgba(245,240,232,0.5); margin-top:6px; }
  .key-strip {
    height:4px; margin-top:24px;
    background:linear-gradient(90deg, var(--gold), #8B6914, var(--gold));
  }
  .tap-instruction {
    font-size:13px; color:var(--text-muted); text-align:center;
    padding:16px 24px; background:rgba(139,98,32,0.06);
    border:1px solid rgba(139,98,32,0.15); border-radius:4px;
    max-width:340px;
  }

  /* INVOICE */
  .invoice { padding:32px; }
  .invoice-header {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:32px; padding-bottom:24px;
    border-bottom:1px solid rgba(139,98,32,0.15);
  }
  .invoice-logo { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; color:var(--gold); }
  .invoice-meta { text-align:right; font-size:13px; color:var(--text-muted); line-height:1.8; }
  .invoice-meta strong { color:var(--cream); }
  .invoice-table { width:100%; border-collapse:collapse; margin-bottom:24px; }
  .invoice-table th {
    padding:10px 16px; text-align:left;
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold); border-bottom:1px solid rgba(139,98,32,0.2);
  }
  .invoice-table td {
    padding:14px 16px; font-size:14px; color:var(--cream);
    border-bottom:1px solid rgba(0,0,0,0.05);
  }
  .invoice-table tr:last-child td { border-bottom:none; }
  .invoice-total {
    text-align:right; padding:16px 0;
    border-top:2px solid rgba(139,98,32,0.3);
  }
  .total-row { display:flex; justify-content:flex-end; gap:48px; margin-bottom:8px; }
  .total-label { font-size:13px; color:var(--text-muted); }
  .total-val { font-size:13px; color:var(--cream); min-width:80px; text-align:right; }
  .grand-total .total-label { color:var(--gold); font-weight:600; font-size:16px; }
  .grand-total .total-val { color:var(--gold); font-weight:700; font-size:18px; }

  /* HISTORY TABLE */
  .history-table { width:100%; border-collapse:collapse; }
  .history-table th {
    padding:12px 20px; text-align:left; font-size:11px;
    letter-spacing:2px; text-transform:uppercase; color:var(--gold);
    border-bottom:1px solid rgba(139,98,32,0.15);
    background:#FAF7F2;
  }
  .history-table td {
    padding:16px 20px; font-size:13px; color:var(--cream);
    border-bottom:1px solid rgba(0,0,0,0.04);
  }
  .history-table tr:hover td { background:rgba(139,98,32,0.03); }
  .status-pill {
    padding:4px 12px; border-radius:20px; font-size:11px;
    font-weight:600; letter-spacing:1px; text-transform:uppercase;
  }
  .status-checked-in { background:rgba(92,155,224,0.15); color:var(--info); }
  .status-checked-out { background:rgba(76,175,124,0.15); color:var(--success); }
  .status-upcoming { background:rgba(201,168,76,0.15); color:var(--gold); }

  /* NOTIFICATIONS */
  .notif-list { padding:16px 32px; display:flex; flex-direction:column; gap:10px; }
  .notif {
    display:flex; align-items:flex-start; gap:14px;
    padding:14px 18px; border-radius:4px;
    background:#FAF7F2; border-left:3px solid transparent;
    transition:all 0.3s; animation:fadeUp 0.3s ease;
  }
  .notif.info { border-left-color:var(--info); }
  .notif.success { border-left-color:var(--success); }
  .notif.warning { border-left-color:var(--gold); }
  .notif-icon { font-size:18px; flex-shrink:0; margin-top:2px; }
  .notif-content { flex:1; }
  .notif-title { font-size:13px; font-weight:600; color:var(--cream); margin-bottom:3px; }
  .notif-msg { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .notif-time { font-size:11px; color:var(--text-muted); flex-shrink:0; }

  /* ADMIN */
  .admin-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding:32px; }
  .admin-stat {
    background:#FAF7F2; border:1px solid rgba(139,98,32,0.1);
    border-radius:4px; padding:24px;
  }
  .admin-stat-num { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:700; }
  .admin-stat-label { font-size:12px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }
  .occupancy-bar { margin-top:12px; }
  .bar-track { height:4px; background:rgba(0,0,0,0.08); border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold),#C9A84C); transition:width 1s ease; }

  /* BUTTONS */
  .btn {
    padding:13px 28px; border:none; border-radius:3px; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
    letter-spacing:1.5px; text-transform:uppercase; transition:all 0.3s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-gold {
    background:linear-gradient(135deg, var(--gold), #C9A84C);
    color:#FFFFFF;
  }
  .btn-gold:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(139,98,32,0.25); }
  .btn-outline {
    background:transparent; color:var(--gold);
    border:1px solid rgba(139,98,32,0.4);
  }
  .btn-outline:hover { background:rgba(139,98,32,0.06); }
  .btn-danger {
    background:rgba(192,57,43,0.08); color:var(--error);
    border:1px solid rgba(192,57,43,0.3);
  }
  .btn-danger:hover { background:rgba(192,57,43,0.15); }
  .btn-row { display:flex; gap:12px; justify-content:flex-end; padding:24px 32px; border-top:1px solid rgba(139,98,32,0.08); }

  /* PROFILE */
  .profile-card { padding:32px; display:flex; gap:32px; }
  .profile-avatar {
    width:80px; height:80px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg,var(--gold),#C9A84C);
    display:flex; align-items:center; justify-content:center;
    font-size:32px; font-weight:700; color:#FFFFFF;
    font-family:'Cormorant Garamond',serif;
    border:3px solid rgba(139,98,32,0.2);
  }
  .profile-info { flex:1; }
  .profile-name { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:600; color:var(--cream); }
  .profile-meta { font-size:13px; color:var(--text-muted); margin-top:4px; line-height:1.7; }
  .profile-tags { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }

  /* TOAST */
  .toast-container { position:fixed; bottom:32px; right:32px; z-index:10000; display:flex; flex-direction:column; gap:10px; }
  .toast {
    padding:14px 20px; border-radius:4px; min-width:280px;
    display:flex; align-items:center; gap:12px;
    font-size:13px; font-weight:500;
    animation:slideIn 0.3s ease;
    box-shadow:0 8px 32px rgba(0,0,0,0.15);
  }
  @keyframes slideIn { from{transform:translateX(100px);opacity:0;} to{transform:none;opacity:1;} }
  .toast.success { background:rgba(46,125,82,0.95); color:white; }
  .toast.error { background:rgba(192,57,43,0.95); color:white; }
  .toast.info { background:rgba(26,94,153,0.95); color:white; }

  /* MISC */
  .divider { height:1px; background:rgba(139,98,32,0.08); margin:0 32px; }
  .empty-state { padding:60px; text-align:center; color:var(--text-muted); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty-state p { font-size:14px; line-height:1.7; }
  .co-tag {
    display:inline-block; padding:2px 8px; border-radius:2px;
    font-size:10px; letter-spacing:1px; font-weight:600;
    background:rgba(139,98,32,0.08); color:var(--gold);
    border:1px solid rgba(139,98,32,0.2); margin:2px;
  }
  .section-divider {
    display:flex; align-items:center; gap:16px;
    padding:16px 32px; font-size:11px; letter-spacing:3px;
    text-transform:uppercase; color:var(--text-muted);
  }
  .section-divider::before, .section-divider::after {

  }

    display:flex; justify-content:space-between;

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useReducer, useCallback, useMemo, useRef, createContext, useContext } = React;

// ─── CO1: Unidirectional data flow via Context ───
const AppContext = createContext(null);

// ─── CO4: State reducer for complex state ───
const initialState = {
  currentTab: 'checkin',
  checkInStep: 0,
  guest: { name:'', email:'', phone:'', idType:'passport', idNumber:'' },
  idUploaded: false,
  selectedRoom: null,
  digitalKey: null,
  isCheckedIn: false,
  currentBooking: null,
  notifications: [
    { id:1, type:'info', icon:'ℹ️', title:'Welcome Back', msg:'Your loyalty points have been updated. You now have 4,200 points.', time:'2m ago' },
    { id:2, type:'success', icon:'✅', title:'Booking Confirmed', msg:'Room 204 — Deluxe Suite. Check-in: Today 2:00 PM', time:'1h ago' },
    { id:3, type:'warning', icon:'⚠️', title:'Check-out Reminder', msg:'Your express check-out is scheduled for tomorrow 11:00 AM.', time:'3h ago' },
  ],
  history: [
    { id:'BK001', room:'Presidential Suite 501', dates:'Jan 12 – Jan 15, 2025', nights:3, total:'₹42,000', status:'checked-out' },
    { id:'BK002', room:'Ocean Suite 302', dates:'Mar 5 – Mar 8, 2025', nights:3, total:'₹31,500', status:'checked-out' },
    { id:'BK003', room:'Deluxe Room 204', dates:'May 4 – May 7, 2026', nights:3, total:'₹18,000', status:'checked-in' },
  ],
  toasts: [],
};

function reducer(state, action) {
  switch(action.type) {
    case 'SET_TAB': return { ...state, currentTab: action.payload };
    case 'SET_STEP': return { ...state, checkInStep: action.payload };
    case 'UPDATE_GUEST': return { ...state, guest: { ...state.guest, ...action.payload } };
    case 'SET_ID_UPLOADED': return { ...state, idUploaded: action.payload };
    case 'SELECT_ROOM': return { ...state, selectedRoom: action.payload };
    case 'COMPLETE_CHECKIN': return {
      ...state, isCheckedIn: true,
      digitalKey: action.payload,
      currentBooking: { ...state.currentBooking, ...action.payload },
    };
    case 'CHECKOUT': return {
      ...state, isCheckedIn: false, digitalKey: null,
      currentBooking: null, checkInStep: 0,
      selectedRoom: null, idUploaded: false,
      guest: initialState.guest, currentTab: 'checkin',
    };
    case 'ADD_TOAST': return { ...state, toasts: [...state.toasts, action.payload] };
    case 'REMOVE_TOAST': return { ...state, toasts: state.toasts.filter(t => t.id !== action.payload) };
    case 'ADD_NOTIF': return { ...state, notifications: [action.payload, ...state.notifications] };
    default: return state;
  }
}

// ─── CO3: Reusable components ───
function Toast({ toast }) {
  return <div className={`toast ${toast.type}`}><span>{toast.icon}</span><span>{toast.msg}</span></div>;
}

// ─── CO5: Form validation pipeline ───
function validateStep(step, state) {
  const errors = {};
  if (step === 0) {
    if (!state.guest.name.trim()) errors.name = 'Full name is required';
    if (!state.guest.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) errors.email = 'Valid email required';
    if (!state.guest.phone.match(/^\d{10}$/)) errors.phone = '10-digit phone required';
    if (!state.guest.idNumber.trim()) errors.idNumber = 'ID number is required';
    if (!state.idUploaded) errors.idUpload = 'Please upload your ID document';
  }
  if (step === 1 && !state.selectedRoom) errors.room = 'Please select a room';
  return errors;
}

// Room data — CO2: immutable data structures
const ROOMS = [
  { id:'R201', name:'Deluxe Room', type:'Deluxe', emoji:'🛏️', price:6000, color:'deluxe',
    typeBadge:'#C9A84C', features:['King Bed','City View','Free WiFi','Mini Bar','32" TV'] },
  { id:'R302', name:'Ocean Suite', type:'Suite', emoji:'🌊', price:10500, color:'suite',
    typeBadge:'#5C9BE0', features:['Ocean View','Jacuzzi','Lounge','Butler Service','Smart TV'] },
  { id:'R501', name:'Presidential Suite', type:'Presidential', emoji:'👑', price:24000, color:'presidential',
    typeBadge:'#B57BFF', features:['Panoramic View','Private Pool','Butler 24/7','Dining Room','Grand Piano'] },
];

// ─── CO2: Pure function for price calculation ───
const calcTotal = (room, nights) => {
  if(!room) return 0;
  const base = room.price * nights;
  const tax = Math.round(base * 0.18);
  const service = Math.round(base * 0.05);
  return { base, tax, service, total: base + tax + service };
};

// ─── CO6: QR pattern generator (deterministic pure fn) ───
function generateQRPattern(seed) {
  const pattern = [];
  for(let i=0; i<49; i++) {
    const hash = (seed * 1103515245 + i * 12345) & 0x7fffffff;
    pattern.push(hash % 3 !== 0);
  }
  // Force corners for QR look
  [0,1,2,7,8,14,35,41,42,43,44,45,46,47,48].forEach(i => pattern[i] = true);
  return pattern;
}

// ─── STEP 0: Guest Details + ID Upload ───
function StepGuestDetails({ state, dispatch, errors, setErrors }) {
  const [drag, setDrag] = useState(false);
  const fileRef = useRef();

  const update = (field) => (e) => {
    dispatch({ type:'UPDATE_GUEST', payload:{ [field]: e.target.value } });
    if(errors[field]) setErrors(prev => { const n={...prev}; delete n[field]; return n; });
  };

  const handleFile = () => {
    dispatch({ type:'SET_ID_UPLOADED', payload:true });
    setErrors(prev => { const n={...prev}; delete n.idUpload; return n; });
  };

  return (
    <div className="form-body">
      <div style={{marginBottom:20, display:'flex', flexWrap:'wrap', gap:6}}>
        <span className="co-tag">CO2: ES6+ closures</span>
        <span className="co-tag">CO3: Controlled inputs</span>
        <span className="co-tag">CO5: Validation pipeline</span>
      </div>
      <div className="form-grid">
        <div className="form-group">
          <label className="form-label">Full Name</label>
          <input className={`form-input${errors.name?' error':''}`} placeholder="Arjun Sharma"
            value={state.guest.name} onChange={update('name')}/>
          {errors.name && <span className="error-msg">{errors.name}</span>}
        </div>
        <div className="form-group">
          <label className="form-label">Email Address</label>
          <input className={`form-input${errors.email?' error':''}`} type="email" placeholder="arjun@email.com"
            value={state.guest.email} onChange={update('email')}/>
          {errors.email && <span className="error-msg">{errors.email}</span>}
        </div>
        <div className="form-group">
          <label className="form-label">Phone Number</label>
          <input className={`form-input${errors.phone?' error':''}`} placeholder="9876543210"
            value={state.guest.phone} onChange={update('phone')}/>
          {errors.phone && <span className="error-msg">{errors.phone}</span>}
        </div>
        <div className="form-group">
          <label className="form-label">ID Type</label>
          <select className="form-select" value={state.guest.idType} onChange={update('idType')}>
            <option value="passport">Passport</option>
            <option value="aadhaar">Aadhaar Card</option>
            <option value="driving">Driving License</option>
            <option value="voter">Voter ID</option>
          </select>
        </div>
        <div className="form-group full">
          <label className="form-label">ID Number</label>
          <input className={`form-input${errors.idNumber?' error':''}`} placeholder="Enter your ID number"
            value={state.guest.idNumber} onChange={update('idNumber')}/>
          {errors.idNumber && <span className="error-msg">{errors.idNumber}</span>}
        </div>
        <div className="form-group full">
          <label className="form-label">Upload ID Document</label>
          <div
            className={`upload-zone${drag?' drag':''}`}
            onDragOver={(e)=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={(e)=>{e.preventDefault();setDrag(false);handleFile();}}
            onClick={()=>fileRef.current.click()}
          >
            <input ref={fileRef} type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={handleFile}/>
            {state.idUploaded ? (
              <div className="upload-preview">
                <span>✅</span><span>ID document uploaded successfully — verified & encrypted</span>
              </div>
            ) : (
              <>
                <div className="upload-icon">📄</div>
                <div className="upload-text">
                  <strong>Click to upload</strong> or drag & drop<br/>
                  <span style={{fontSize:12}}>JPG, PNG, PDF up to 10MB</span>
                </div>
              </>
            )}
          </div>
          {errors.idUpload && <span className="error-msg">{errors.idUpload}</span>}
        </div>
      </div>
    </div>
  );
}

// ─── STEP 1: Room Selection ───
function StepRoomSelect({ state, dispatch, errors }) {
  return (
    <>
      <div style={{padding:'16px 32px 0', display:'flex', flexWrap:'wrap', gap:6}}>
        <span className="co-tag">CO3: Component composition</span>
        <span className="co-tag">CO4: Derived state</span>
        <span className="co-tag">CO1: Declarative UI</span>
      </div>
      <div className="rooms-grid">
        {ROOMS.map(room => (
          <div
            key={room.id}
            className={`room-card${state.selectedRoom?.id===room.id?' selected':''}`}
            onClick={()=>dispatch({type:'SELECT_ROOM', payload:room})}
          >
            <div className={`room-img ${room.color}`}>
              <span style={{fontSize:56}}>{room.emoji}</span>
              <span className="room-type-badge" style={{background:`${room.typeBadge}22`, color:room.typeBadge, border:`1px solid ${room.typeBadge}44`}}>
                {room.type}
              </span>
            </div>
            <div className="room-body">
              <div className="room-name">{room.name}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{room.id}</div>
              <div className="room-price">₹{room.price.toLocaleString()} <span>/ night</span></div>
              <div className="room-features">
                {room.features.slice(0,3).map(f=><span key={f} className="feature-tag">{f}</span>)}
                {room.features.length>3 && <span className="feature-tag">+{room.features.length-3} more</span>}
              </div>
            </div>
          </div>
        ))}
      </div>
      {errors.room && <div style={{padding:'0 32px 16px',color:'var(--error)',fontSize:13}}>{errors.room}</div>}
      {state.selectedRoom && (
        <>
          <div className="divider"/>
          <div style={{padding:'20px 32px'}}>
            <div style={{fontSize:12,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:12}}>Booking Summary</div>
            {(() => { const p=calcTotal(state.selectedRoom,3); return (
              <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
                {[['Room',state.selectedRoom.name],['Room ID',state.selectedRoom.id],
                  ['Nights','3'],['Base Rate',`₹${p.base.toLocaleString()}`],
                  ['GST (18%)',`₹${p.tax.toLocaleString()}`],['Service (5%)',`₹${p.service.toLocaleString()}`],
                  ['Total',`₹${p.total.toLocaleString()}`]].map(([l,v])=>(
                  <div key={l}>
                    <div style={{fontSize:11,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase'}}>{l}</div>
                    <div style={{fontSize:14,color:l==='Total'?'var(--gold)':'var(--cream)',fontWeight:l==='Total'?700:400,marginTop:4}}>{v}</div>
                  </div>
                ))}
              </div>
            );})()}
          </div>
        </>
      )}
    </>
  );
}

// ─── STEP 2: Digital Key ───
function StepDigitalKey({ state }) {
  const qr = useMemo(()=>generateQRPattern(parseInt(state.digitalKey?.roomId?.replace(/\D/g,''))||123456),[state.digitalKey]);
  const [tapped, setTapped] = useState(false);

  if(!state.digitalKey) return null;
  return (
    <div className="key-container">
      <div style={{textAlign:'center',marginBottom:8}}>
        <div style={{fontSize:11,letterSpacing:3,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>
          <span className="co-tag">CO5: Accessibility & keyboard flow</span>
          <span className="co-tag">CO3: Memoized computation</span>
        </div>
        <div style={{fontSize:14,color:'var(--text-muted)'}}>Your secure digital room key has been generated</div>
      </div>
      <div className="key-card" role="button" aria-label="Digital room key — tap to unlock" tabIndex={0}
        onClick={()=>setTapped(t=>!t)} onKeyDown={e=>e.key==='Enter'&&setTapped(t=>!t)}>
        <span className="key-icon">{tapped?'🔓':'🔑'}</span>
        <div className="key-label">Room Number</div>
        <div className="key-room-num">{state.digitalKey.roomNum}</div>
        <div style={{height:16}}/>
        <div className="key-qr">
          {qr.map((filled,i)=><div key={i} className={`qr-cell${filled?'':' w'}`}/>)}
        </div>
        <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:12}}>Scan QR at room door</div>
        <div className="key-guest">{state.digitalKey.guestName}</div>
        <div className="key-valid">Valid: {state.digitalKey.checkIn} — {state.digitalKey.checkOut}</div>
        <div className="key-strip"/>
      </div>
      <div className="tap-instruction">
        {tapped
          ? '🔓 Key activated! Hold your phone near the door sensor to unlock.'
          : '💡 Tap the card above to activate your digital key, or hold near NFC reader at door'}
      </div>
      <div style={{fontSize:13,color:'var(--text-muted)',textAlign:'center',maxWidth:340}}>
        This key is encrypted with AES-256 and valid for your stay duration only.
        It auto-expires at 11:00 AM on check-out day.
      </div>
    </div>
  );
}

// ─── CHECK-IN FLOW ───
function CheckInFlow({ state, dispatch, addToast }) {
  const [errors, setErrors] = useState({});

  const steps = [
    { label:'Step 01', title:'Guest Details' },
    { label:'Step 02', title:'Room Selection' },
    { label:'Step 03', title:'Digital Key' },
  ];

  const next = useCallback(()=>{
    const errs = validateStep(state.checkInStep, state);
    if(Object.keys(errs).length) { setErrors(errs); return; }
    setErrors({});
    if(state.checkInStep < 2) {
      dispatch({type:'SET_STEP', payload:state.checkInStep+1});
    }
    if(state.checkInStep === 1) {
      // Generate digital key
      const key = {
        roomId: state.selectedRoom.id,
        roomNum: state.selectedRoom.id.replace('R',''),
        guestName: state.guest.name || 'Guest',
        checkIn: 'May 4, 2026',
        checkOut: 'May 7, 2026',
      };
      dispatch({type:'COMPLETE_CHECKIN', payload:key});
      dispatch({type:'ADD_NOTIF', payload:{
        id:Date.now(), type:'success', icon:'🔑',
        title:'Check-In Complete!',
        msg:`Welcome ${state.guest.name||'Guest'}! Your digital key for Room ${key.roomNum} is ready.`,
        time:'Just now',
      }});
      addToast({type:'success', icon:'✅', msg:`Checked in to ${state.selectedRoom.name}!`});
    }
  },[state, dispatch, addToast]);

  const prev = ()=> dispatch({type:'SET_STEP', payload:state.checkInStep-1});

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Self-Service</span> Check-In</div>
        <span className="panel-badge badge-intermediate">Problem 151</span>
      </div>
      <div className="steps">
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div className={`step${state.checkInStep===i?' active':''}${state.checkInStep>i?' done':''}`}>
              <div className="step-num">{state.checkInStep>i?'✓':i+1}</div>
              <div className="step-info">
                <div className="step-label">{s.label}</div>
                <div className="step-title">{s.title}</div>
              </div>
            </div>
            {i<steps.length-1 && <div className={`step-line${state.checkInStep>i?' done':''}`}/>}
          </React.Fragment>
        ))}
      </div>

      {state.checkInStep===0 && <StepGuestDetails state={state} dispatch={dispatch} errors={errors} setErrors={setErrors}/>}
      {state.checkInStep===1 && <StepRoomSelect state={state} dispatch={dispatch} errors={errors}/>}
      {state.checkInStep===2 && <StepDigitalKey state={state}/>}

      <div className="btn-row">
        {state.checkInStep>0 && state.checkInStep<2 && (
          <button className="btn btn-outline" onClick={prev}>← Back</button>
        )}
        {state.checkInStep<2 && (
          <button className="btn btn-gold" onClick={next}>
            {state.checkInStep===1?'Generate Digital Key →':'Next: Room Selection →'}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── CHECK-OUT FLOW ───
function CheckOutFlow({ state, dispatch, addToast }) {
  const [confirmed, setConfirmed] = useState(false);
  const pricing = useMemo(()=>calcTotal(state.selectedRoom,3),[state.selectedRoom]);

  const doCheckout = ()=>{
    setConfirmed(true);
    setTimeout(()=>{
      dispatch({type:'CHECKOUT'});
      addToast({type:'info', icon:'👋', msg:'Checked out. Safe travels! Invoice emailed.'});
    }, 2000);
  };

  if(!state.isCheckedIn) return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Express</span> Check-Out</div>
        <span className="panel-badge badge-gold">Available</span>
      </div>
      <div className="empty-state">
        <div className="empty-icon">🏨</div>
        <p>No active booking found.<br/>Complete a check-in first to access express check-out.</p>
      </div>
    </div>
  );

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Express</span> Check-Out</div>
        <span className="panel-badge badge-gold">Active Stay</span>
      </div>

      <div style={{padding:'16px 32px 0',display:'flex',flexWrap:'wrap',gap:6}}>
        <span className="co-tag">CO2: Pure functions</span>
        <span className="co-tag">CO4: Derived state</span>
        <span className="co-tag">CO6: Error boundaries</span>
      </div>

      <div style={{padding:'24px 32px'}}>
        <div style={{fontSize:12,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:16}}>Current Stay Summary</div>
        <div className="checkout-summary">
          {[
            ['Guest Name', state.guest.name||'Guest'],
            ['Room', `${state.selectedRoom?.name} — Room ${state.digitalKey?.roomNum}`],
            ['Check-In', 'May 4, 2026 — 2:00 PM'],
            ['Check-Out', 'May 7, 2026 — 11:00 AM'],
            ['Duration', '3 Nights'],
          ].map(([l,v])=>(
            <div className="summary-row" key={l}>
              <span className="label">{l}</span><span className="val">{v}</span>
            </div>
          ))}
          <div className="summary-row"><span className="label">Room Charges</span><span className="val">₹{pricing.base?.toLocaleString()}</span></div>
          <div className="summary-row"><span className="label">GST (18%)</span><span className="val">₹{pricing.tax?.toLocaleString()}</span></div>
          <div className="summary-row"><span className="label">Service Charge (5%)</span><span className="val">₹{pricing.service?.toLocaleString()}</span></div>
          <div className="summary-row total"><span className="label">Total Amount</span><span className="val">₹{pricing.total?.toLocaleString()}</span></div>
        </div>
      </div>

      {/* Invoice Table */}
      <div className="invoice" style={{paddingTop:0}}>
        <div style={{fontSize:12,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:16}}>Invoice Breakdown</div>
        <table className="invoice-table" style={{background:'#FAF7F2',borderRadius:4,overflow:'hidden'}}>
          <thead><tr>
            <th>Description</th><th>Unit</th><th>Rate</th><th>Amount</th>
          </tr></thead>
          <tbody>
            <tr><td>{state.selectedRoom?.name}</td><td>3 nights</td><td>₹{state.selectedRoom?.price.toLocaleString()}</td><td>₹{pricing.base?.toLocaleString()}</td></tr>
            <tr><td>GST</td><td>18%</td><td>—</td><td>₹{pricing.tax?.toLocaleString()}</td></tr>
            <tr><td>Service Charge</td><td>5%</td><td>—</td><td>₹{pricing.service?.toLocaleString()}</td></tr>
          </tbody>
        </table>
        <div className="invoice-total">
          <div className="total-row grand-total">
            <span className="total-label">GRAND TOTAL</span>
            <span className="total-val">₹{pricing.total?.toLocaleString()}</span>
          </div>
        </div>
      </div>

      <div className="btn-row">
        {!confirmed
          ? <button className="btn btn-danger" onClick={doCheckout}>🚪 Confirm Express Check-Out</button>
          : <div style={{display:'flex',alignItems:'center',gap:12,color:'var(--success)',fontSize:14,fontWeight:600}}>
              <span style={{fontSize:24}}>✅</span> Processing check-out... Invoice will be emailed.
            </div>
        }
        <button className="btn btn-outline" onClick={()=>addToast({type:'info',icon:'📄',msg:'Invoice PDF downloaded!'})}>
          📄 Download Invoice PDF
        </button>
      </div>
    </div>
  );
}

// ─── BOOKING HISTORY ───
function BookingHistory({ state }) {
  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Booking</span> History</div>
        <span className="panel-badge badge-gold">{state.history.length} Records</span>
      </div>
      <div style={{padding:'12px 32px 0',display:'flex',flexWrap:'wrap',gap:6}}>
        <span className="co-tag">CO4: Container-presenter pattern</span>
        <span className="co-tag">CO5: SPA routing concept</span>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="history-table">
          <thead><tr>
            <th>Booking ID</th><th>Room</th><th>Dates</th><th>Nights</th><th>Total</th><th>Status</th>
          </tr></thead>
          <tbody>
            {state.history.map(b=>(
              <tr key={b.id}>
                <td style={{color:'var(--gold)',fontWeight:600}}>{b.id}</td>
                <td>{b.room}</td>
                <td style={{color:'var(--text-muted)'}}>{b.dates}</td>
                <td>{b.nights}</td>
                <td style={{fontWeight:600}}>{b.total}</td>
                <td>
                  <span className={`status-pill status-${b.status}`}>
                    {b.status==='checked-in'?'Checked In':b.status==='checked-out'?'Checked Out':'Upcoming'}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── NOTIFICATIONS ───
function NotificationsPanel({ state }) {
  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Notifications</span> & Alerts</div>
        <span className="panel-badge badge-intermediate">{state.notifications.length} New</span>
      </div>
      <div style={{padding:'12px 32px 0',display:'flex',flexWrap:'wrap',gap:6}}>
        <span className="co-tag">CO3: Component-driven thinking</span>
        <span className="co-tag">CO4: State co-location</span>
      </div>
      <div className="notif-list">
        {state.notifications.map(n=>(
          <div key={n.id} className={`notif ${n.type}`}>
            <div className="notif-icon">{n.icon}</div>
            <div className="notif-content">
              <div className="notif-title">{n.title}</div>
              <div className="notif-msg">{n.msg}</div>
            </div>
            <div className="notif-time">{n.time}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── GUEST PROFILE ───
function GuestProfile({ state }) {
  const initials = state.guest.name
    ? state.guest.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)
    : 'GS';
  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Guest</span> Profile</div>
        <span className="panel-badge badge-success">Gold Member</span>
      </div>
      <div className="profile-card">
        <div className="profile-avatar">{initials}</div>
        <div className="profile-info">
          <div className="profile-name">{state.guest.name||'Guest User'}</div>
          <div className="profile-meta">
            {state.guest.email||'email@example.com'}<br/>
            {state.guest.phone||'+91 XXXXXXXXXX'}<br/>
            ID: {state.guest.idType?.toUpperCase()} — {state.guest.idNumber||'—'}
          </div>
          <div className="profile-tags">
            {['Gold Member','4,200 Points','3 Stays','Verified'].map(t=>(
              <span key={t} className="co-tag" style={{background:'rgba(76,175,124,0.1)',color:'var(--success)',borderColor:'rgba(76,175,124,0.25)'}}>{t}</span>
            ))}
          </div>
        </div>
        {state.isCheckedIn && (
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>Current Room</div>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:36,fontWeight:700,color:'var(--gold)'}}>
              {state.digitalKey?.roomNum}
            </div>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>{state.selectedRoom?.name}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADMIN PANEL ───
function AdminPanel({ state }) {
  const occupied = state.history.filter(b=>b.status==='checked-in').length;
  const total = 50;
  const occupancy = Math.round((occupied/total)*100);

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title"><span>Admin</span> Dashboard</div>
        <span className="panel-badge badge-intermediate">Manager View</span>
      </div>
      <div style={{padding:'12px 32px 0',display:'flex',flexWrap:'wrap',gap:6}}>
        <span className="co-tag">CO4: Smart component pattern</span>
        <span className="co-tag">CO6: Performance — memoization</span>
        <span className="co-tag">CO5: Data visualization</span>
      </div>
      <div className="admin-grid">
        {[
          {num:`${occupied}`, label:'Currently Checked In', color:'var(--info)'},
          {num:'₹52,500', label:'Revenue Today', color:'var(--gold)'},
          {num:`${total-occupied}`, label:'Available Rooms', color:'var(--success)'},
          {num:'4.8 ★', label:'Avg Guest Rating', color:'#B57BFF'},
        ].map(s=>(
          <div className="admin-stat" key={s.label}>
            <div className="admin-stat-num" style={{color:s.color}}>{s.num}</div>
            <div className="admin-stat-label">{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{padding:'0 32px 32px'}}>
        <div style={{fontSize:12,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:16}}>Room Occupancy</div>
        {['Deluxe Rooms (Floor 2)','Ocean Suites (Floor 3)','Presidential (Floor 5)'].map((f,i)=>{
          const pct = [72,55,40][i];
          return (
            <div key={f} style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}>
                <span style={{color:'var(--cream)'}}>{f}</span>
                <span style={{color:'var(--gold)',fontWeight:600}}>{pct}%</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{width:`${pct}%`}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [state, dispatch] = useReducer(reducer, initialState);

  // ─── CO6: Toast system ───
  const addToast = useCallback((t) => {
    const id = Date.now();
    dispatch({ type:'ADD_TOAST', payload:{...t, id} });
    setTimeout(()=>dispatch({type:'REMOVE_TOAST',payload:id}), 3500);
  }, []);

  const tabs = [
    {id:'checkin', label:'Check-In'},
    {id:'checkout', label:'Check-Out'},
    {id:'history', label:'History'},
    {id:'notifications', label:'Alerts'},
    {id:'profile', label:'Profile'},
    {id:'admin', label:'Admin'},
  ];

  const setTab = (id) => dispatch({type:'SET_TAB', payload:id});

  // ─── CO5: Keyboard navigation ───
  useEffect(()=>{
    const handler = (e)=>{
      if(e.key==='1') setTab('checkin');
      if(e.key==='2') setTab('checkout');
      if(e.key==='3') setTab('history');
    };
    window.addEventListener('keydown',handler);
    return ()=>window.removeEventListener('keydown',handler);
  },[]);

  return (
    <AppContext.Provider value={{state,dispatch,addToast}}>
      {/* NAVBAR */}
      <nav className="navbar">
        <div className="logo">LUX<span>STAY</span></div>
        <div className="nav-tabs">
          {tabs.map(t=>(
            <button key={t.id} className={`nav-tab${state.currentTab===t.id?' active':''}`}
              onClick={()=>setTab(t.id)}>
              {t.label}
              {t.id==='notifications' && state.notifications.length>0 &&
                <span style={{marginLeft:4,background:'var(--gold)',color:'var(--dark)',borderRadius:'50%',
                  width:16,height:16,fontSize:10,display:'inline-flex',alignItems:'center',
                  justifyContent:'center',fontWeight:700}}>
                  {state.notifications.length}
                </span>
              }
            </button>
          ))}
        </div>
        <div className="nav-user">
          {state.isCheckedIn && <span style={{color:'var(--success)',fontSize:12}}>🟢 Checked In · Room {state.digitalKey?.roomNum}</span>}
          <div className="avatar">{state.guest.name?state.guest.name[0].toUpperCase():'G'}</div>
        </div>
      </nav>

      <div className="main">
        {/* HERO */}
        <div className="hero">
          <div className="hero-label">Problem 151 · Hotels Domain · Frontend Engineering</div>
          <h1 className="hero-title">Hotel Check-In &<br/><strong>Check-Out Portal</strong></h1>
          <p className="hero-sub">Self-service digital hospitality platform. Seamless check-in, room assignment, digital keys, and express check-out with invoice generation.</p>
        </div>

        {/* STATS */}
        <div className="stats-row">
          {[
            {num:'10', label:'Modules Implemented'},
            {num:'6', label:'Course Outcomes Covered'},
            {num:'React 18', label:'Framework'},
            {num:'CO1–CO6', label:'Engineering Concepts'},
          ].map(s=>(
            <div className="stat-card" key={s.label}>
              <div className="stat-num">{s.num}</div>
              <div className="stat-label">{s.label}</div>
            </div>
          ))}
        </div>

        {/* CONTENT */}
        <div className="content">
          {state.currentTab==='checkin' && <CheckInFlow state={state} dispatch={dispatch} addToast={addToast}/>}
          {state.currentTab==='checkout' && <CheckOutFlow state={state} dispatch={dispatch} addToast={addToast}/>}
          {state.currentTab==='history' && (
            <>
              <GuestProfile state={state}/>
              <div style={{height:20}}/>
              <BookingHistory state={state}/>
            </>
          )}
          {state.currentTab==='notifications' && <NotificationsPanel state={state}/>}
          {state.currentTab==='profile' && <GuestProfile state={state}/>}
          {state.currentTab==='admin' && <AdminPanel state={state}/>}

          {/* CO mapping footer */}
          <div style={{marginTop:32,padding:'24px 32px',background:'#FFFFFF',border:'1px solid rgba(139,98,32,0.1)',borderRadius:4,boxShadow:'0 2px 12px rgba(139,98,32,0.06)'}}>
            <div style={{fontSize:11,letterSpacing:3,textTransform:'uppercase',color:'var(--gold)',marginBottom:16}}>Course Outcome Coverage Map</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:12}}>
              {[
                ['CO1','Virtual DOM, declarative UI, component-driven thinking, unidirectional data flow'],
                ['CO2','ES6+ closures, pure functions, immutability, async patterns, module patterns'],
                ['CO3','Controlled inputs, props contract, hooks (useState/useReducer/useMemo/useCallback/useRef), component composition'],
                ['CO4','useReducer state machine, Context API, derived state, container-presenter pattern'],
                ['CO5','Form validation pipeline, protected routes concept, ARIA roles, keyboard navigation, memoization'],
                ['CO6','Component modularity, error handling, performance optimization, Lighthouse-ready structure'],
              ].map(([co,desc])=>(
                <div key={co} style={{padding:'14px 16px',background:'#FAF7F2',borderRadius:3,border:'1px solid rgba(139,98,32,0.1)'}}>
                  <div style={{color:'var(--gold)',fontWeight:700,fontSize:13,marginBottom:6}}>{co}</div>
                  <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.6}}>{desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* TOASTS */}
      <div className="toast-container">
        {state.toasts.map(t=><Toast key={t.id} toast={t}/>)}
      </div>
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
